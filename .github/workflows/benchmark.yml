# On-demand performance comparison for qwc.
#
# Builds the current branch in Release, then uses hyperfine to compare counting
# throughput across a matrix of wc flags against three references:
#   * qwc baseline -- "did this branch improve?" Built from origin/main on a
#                     feature branch; on main runs the comparison column is the
#                     latest published release binary, so main still carries a
#                     regression signal across release cycles. If no release
#                     exists yet (or the asset is missing), the column is
#                     omitted and the rest of the run proceeds.
#   * uu-wc        -- uutils coreutils, the closest competitor (pinned release)
#   * GNU wc       -- the headline number (the runner's system coreutils)
#
# Report-only: it never fails the build. Manual dispatch only -- benchmarks are
# noisy and costly, so they run when you ask for them. Correctness is NOT checked
# here; that is the conformance suite's job (and qwc's -L intentionally diverges
# from GNU wc on wide characters).
#
# NOTE: workflow_dispatch only shows the "Run workflow" button once this file is
# on the default branch (main). On a feature branch it is invisible in the UI.

name: benchmark

on:
  workflow_dispatch:
    inputs:
      data_size:
        description: "Generated corpus size (e.g. 512MiB, 1GiB)"
        default: "512MiB"
      runs:
        description: "hyperfine runs per command"
        default: "10"
      warmup:
        description: "hyperfine warmup runs (1 is enough to warm a cold runner's cache)"
        default: "1"

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: hyperfine (branch vs main vs uu-wc vs GNU wc)
    runs-on: ubuntu-latest  # x86_64; hosted runners support AVX2 / x86-64-v3
    env:
      HYPERFINE_VERSION: "1.18.0"
      UUTILS_VERSION: "0.9.0"
    steps:
      - name: Checkout (full history so origin/main is available)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install hyperfine + uu-wc (pinned)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hyperfine.deb \
            "https://github.com/sharkdp/hyperfine/releases/download/v${HYPERFINE_VERSION}/hyperfine_${HYPERFINE_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/hyperfine.deb
          curl -fsSL -o /tmp/uutils.tar.gz \
            "https://github.com/uutils/coreutils/releases/download/${UUTILS_VERSION}/coreutils-${UUTILS_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p /tmp/uutils && tar -xzf /tmp/uutils.tar.gz -C /tmp/uutils
          sudo install "$(find /tmp/uutils -name coreutils -type f | head -1)" /usr/local/bin/coreutils
          hyperfine --version
          coreutils --version | head -1
          wc --version | head -1

      - name: Build branch (Release)
        run: |
          cmake -S . -B build-branch -DCMAKE_BUILD_TYPE=Release -DQWC_BUILD_TESTS=OFF
          cmake --build build-branch --target qwc
          # qwc emits to the source-tree root (RUNTIME_OUTPUT_DIRECTORY); name it.
          cp ./qwc ./qwc-branch

      - name: Build main (Release)
        if: github.ref != 'refs/heads/main'
        run: |
          git worktree add /tmp/main-tree origin/main
          cmake -S /tmp/main-tree -B build-main -DCMAKE_BUILD_TYPE=Release -DQWC_BUILD_TESTS=OFF
          cmake --build build-main --target qwc
          cp /tmp/main-tree/qwc ./qwc-main

      # On main runs there is no "branch vs main" comparison to make, so the
      # baseline column is the latest published release binary instead. That
      # keeps a regression signal in front of any main run, across release
      # cycles. If no release exists yet (or the Linux x86_64 asset is missing
      # for some reason) the column is omitted -- the bench step keys off the
      # presence of ./qwc-main and proceeds without it.
      - name: Download latest release as baseline (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/qwc-latest
          if gh release download --pattern qwc-linux-x86_64.tar.gz --dir /tmp/qwc-latest; then
            tar -xzf /tmp/qwc-latest/qwc-linux-x86_64.tar.gz -C /tmp/qwc-latest
            cp /tmp/qwc-latest/qwc ./qwc-main
            echo "Using latest release as the baseline:"
            ./qwc-main --version
          else
            echo "No release asset found; the baseline column will be omitted on this run."
          fi

      # Two corpora, same total size: one big file (stresses in-file chunk
      # parallelism + the SIMD kernels) and a directory of many varied-size files
      # (stresses the per-file open/fstat dispatch). File sizes are log-uniform
      # so the many-files profile sweeps the whole per-file-overhead curve.
      - name: Generate corpora
        run: |
          python3 benchmarks/gen-data.py --size "${{ inputs.data_size }}" --out corpus_big.txt
          python3 benchmarks/gen-data.py --many --size "${{ inputs.data_size }}" --out corpus_many

      - name: Run benchmarks
        run: |
          set -euo pipefail
          MAIN_ARG=""
          if [ -f ./qwc-main ]; then
            MAIN_ARG="--qwc-main ./qwc-main"
            # On main runs the baseline is the latest release rather than main
            # itself, so the column gets a non-default display label.
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              MAIN_ARG="$MAIN_ARG --qwc-main-name latest-release"
            fi
          fi
          common=(--qwc ./qwc-branch $MAIN_ARG --uuwc "coreutils wc" --gwc wc
                  --runs "${{ inputs.runs }}" --warmup "${{ inputs.warmup }}")
          python3 benchmarks/bench.py "${common[@]}" \
            --title "Single large file (${{ inputs.data_size }})" \
            --data corpus_big.txt --json-out bench-big.json | tee bench-big.md
          python3 benchmarks/bench.py "${common[@]}" \
            --title "Many small files (~${{ inputs.data_size }}, log-uniform 4KiB-1MiB)" \
            --data corpus_many --json-out bench-many.json | tee bench-many.md

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-big.md
            bench-big.json
            bench-many.md
            bench-many.json
